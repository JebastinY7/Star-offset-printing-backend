<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            background:
            linear-gradient(
                135deg,
                #f4e7b5,
                #efe2aa
            );
        }

        .error-box{

            width:420px;
            background:#fff;

            padding:50px 35px;

            border-radius:20px;

            text-align:center;

            box-shadow:
            0 15px 40px rgba(0,0,0,0.08);

            animation:fadeIn 0.4s ease;
        }

        .error-icon{
            font-size:70px;
            margin-bottom:20px;
        }

        h1{
            font-size:34px;
            color:#222;
            margin-bottom:15px;
        }

        p{
            color:#666;
            line-height:1.7;
            margin-bottom:30px;
            font-size:16px;
        }

        .btn{

            display:inline-block;

            padding:14px 30px;

            border-radius:10px;

            text-decoration:none;

            font-weight:600;

            background:
            linear-gradient(
                135deg,
                #d4aa36,
                #c99818
            );

            color:white;

            transition:0.3s;
        }

        .btn:hover{
            transform:translateY(-2px);
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(20px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

    </style>
</head>
<body>

    <div class="error-box">

        <div class="error-icon">
            🚫
        </div>

        <h1>Access Denied</h1>

        <p>
            You don't have permission
            to access this page.
            Please contact admin.
        </p>

        <a href="/dashboard/" class="btn">
            Back to Dashboard
        </a>

    </div>

</body>
</html>
